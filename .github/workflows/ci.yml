name: Pipeline mit ServiceNow Change Control

on:
  push:
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Quellcode auschecken
        uses: actions/checkout@v4
      - name: Einfacher Build Schritt
        run: echo "Build erfolgreich!"
      - name: Abhängigkeiten installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y curl build-essential

      - name: Linter ausführen
        run: |
          echo "Starte Linter..."
          # Beispiel: `npm run lint` oder `flake8 .`

      - name: Unit Tests ausführen
        run: |
          echo "Starte Unit Tests..."
          # Beispiel: `npm test` oder `pytest`

      - name: Coverage-Bericht generieren
        run: |
          echo "Generiere Coverage-Bericht..."
          # Beispiel: `coverage run -m pytest` und `coverage report`

      - name: Integrationstests ausführen
        run: |
          echo "Starte Integrationstests..."
          # Beispiel: `npm run integration-test` oder benutzerdefinierte Skripte

      - name: Ergebnisse hochladen
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: ./test-results/

      - name: Benachrichtigung senden
        run: |
          echo "Sende Benachrichtigung..."
          # Beispiel: Webhook oder Slack-Benachrichtigung